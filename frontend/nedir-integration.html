<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedir.me Entegrasyonu - AI Video Bot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/nedir-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sol Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <span class="material-symbols-rounded">movie</span>
                    <h1>AI Video Bot</h1>
                </div>
            </div>
            
            <nav>
                <a href="/" class="nav-item">
                    <span class="material-symbols-rounded">dashboard</span>
                    <span>Ana Sayfa</span>
                </a>
                <div class="nav-item active">
                    <span class="material-symbols-rounded">integration_instructions</span>
                    <span>Nedir.me</span>
                </div>
            </nav>
        </aside>

        <!-- Ana İçerik -->
        <main class="main-content">
            <div class="sections">
                <div class="section" id="nedir-section" style="display: block;">
                    <div class="section-header">
                        <h2><span class="material-symbols-rounded">integration_instructions</span> Nedir.me Entegrasyonu</h2>
                        <p>WordPress sitesinden kavramlar çekerek otomatik video üretin</p>
                    </div>

                    <div class="nedir-controls">
                        <div class="control-group">
                            <label for="nedir-category">Kategori</label>
                            <select id="nedir-category">
                                <option value="">Tüm Kategoriler</option>
                                <option value="teknoloji">Teknoloji</option>
                                <option value="bilim">Bilim</option>
                                <option value="tarih">Tarih</option>
                                <option value="sanat">Sanat</option>
                                <option value="genel">Genel</option>
                            </select>
                        </div>
                        
                        <div class="control-group">
                            <label for="nedir-limit">Kavram Sayısı</label>
                            <input type="number" id="nedir-limit" min="1" max="50" value="10">
                        </div>
                        
                        <button class="btn btn-primary" id="fetch-concepts">
                            <i class="fas fa-download"></i>
                            Kavramları Getir
                        </button>
                        
                        <button class="btn btn-success" id="bulk-create-videos" style="display: none;">
                            <i class="fas fa-video"></i>
                            Toplu Video Üret
                        </button>
                    </div>

                    <div id="concepts-container" style="display: none;">
                        <h3>Bulunan Kavramlar</h3>
                        <div id="concepts-list" class="concepts-grid"></div>
                    </div>

                    <div id="video-topics-container" style="display: none;">
                        <h3>Oluşturulacak Video Konuları</h3>
                        <div id="video-topics-list" class="topics-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/nedir-integration.js"></script>
</body>
</html>
